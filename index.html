<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Прототип бота — Сценарій 1</title>
<style>
  :root {
    --tg-bg: #dce4ea;
    --tg-header: #ffffff;
    --tg-incoming: #ffffff;
    --tg-outgoing: #effdde;
    --tg-outgoing-tail: #effdde;
    --tg-accent: #3390ec;
    --tg-text: #000000;
    --tg-subtext: #707579;
    --tg-bot-bg: #fef8e0;
    --tg-bot-border: #f0d97a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0e1621;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px 0;
  }
  .phone {
    width: 420px;
    max-width: 100vw;
    height: 850px;
    max-height: 95vh;
    background: var(--tg-bg);
    border-radius: 28px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    position: relative;
    border: 8px solid #1c1c1e;
  }
  .header {
    background: var(--tg-header);
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid #e2e6ea;
    flex-shrink: 0;
    z-index: 5;
  }
  .header .back {
    font-size: 22px;
    color: var(--tg-accent);
    margin-right: 2px;
  }
  .header .avatar {
    width: 38px;
    height: 38px;
    border-radius: 50%;
    object-fit: cover;
    flex-shrink: 0;
    background: #333;
  }
  .header .info { display: flex; flex-direction: column; line-height: 1.15; }
  .header .name { font-weight: 600; font-size: 15px; color: var(--tg-text); }
  .header .status { font-size: 12.5px; color: var(--tg-accent); }
  .header .icons { margin-left: auto; display: flex; gap: 18px; color: var(--tg-accent); font-size: 18px; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 14px 10px 14px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background-image: radial-gradient(circle at 20% 20%, rgba(255,255,255,0.35) 0%, transparent 40%),
                       radial-gradient(circle at 80% 60%, rgba(255,255,255,0.25) 0%, transparent 40%);
  }
  .row { display: flex; width: 100%; }
  .row.in { justify-content: flex-start; }
  .row.out { justify-content: flex-end; }

  .sticker-msg {
    width: 132px;
    height: 132px;
    object-fit: contain;
    border-radius: 12px;
    margin: 2px 0;
  }

  .bubble {
    max-width: 78%;
    padding: 7px 11px 8px;
    border-radius: 14px;
    font-size: 14.5px;
    line-height: 1.35;
    box-shadow: 0 1px 0.5px rgba(0,0,0,0.08);
    white-space: pre-wrap;
    animation: pop 0.18s ease-out;
  }
  @keyframes pop {
    from { transform: scale(0.92); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .bubble.in {
    background: var(--tg-incoming);
    color: var(--tg-text);
    border-top-left-radius: 4px;
  }
  .bubble.out {
    background: var(--tg-outgoing);
    color: var(--tg-text);
    border-top-right-radius: 4px;
  }
  .bubble.bot {
    background: var(--tg-bot-bg);
    border: 1px solid var(--tg-bot-border);
    color: #6b5a12;
    border-radius: 10px;
    max-width: 88%;
    font-size: 13.5px;
  }
  .bubble.bot .bot-title {
    font-weight: 700;
    margin-bottom: 4px;
    color: #5c4a05;
  }

  .typing {
    background: var(--tg-incoming);
    border-radius: 14px;
    border-top-left-radius: 4px;
    padding: 10px 14px;
    display: inline-flex;
    gap: 4px;
    align-items: center;
  }
  .typing span {
    width: 6px; height: 6px; border-radius: 50%;
    background: #a6acb1;
    animation: blink 1.2s infinite ease-in-out;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.3; transform: translateY(0); }
    40% { opacity: 1; transform: translateY(-3px); }
  }

  .buttons-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 6px 4px 4px;
    animation: pop 0.2s ease-out;
  }
  .choice-btn {
    background: #ffffff;
    border: 1px solid #d8dde1;
    color: var(--tg-accent);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    text-align: center;
    cursor: pointer;
    transition: background 0.12s;
    font-family: inherit;
  }
  .choice-btn:hover { background: #f0f6fc; }
  .choice-btn:active { background: #e2eefa; }

  .footer {
    background: var(--tg-header);
    border-top: 1px solid #e2e6ea;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .footer .input-fake {
    flex: 1;
    background: #f0f2f5;
    border-radius: 18px;
    padding: 9px 14px;
    color: #9099a2;
    font-size: 14px;
  }
  .footer .send {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: var(--tg-accent);
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-size: 16px;
    flex-shrink: 0;
  }

  .score-badge {
    position: absolute;
    top: 60px;
    right: 10px;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 11px;
    padding: 4px 9px;
    border-radius: 10px;
    z-index: 4;
    letter-spacing: 0.3px;
  }
  .restart-fab {
    position: absolute;
    bottom: 68px;
    right: 14px;
    background: var(--tg-accent);
    color: white;
    border: none;
    border-radius: 50%;
    width: 42px;
    height: 42px;
    font-size: 18px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
    cursor: pointer;
    z-index: 6;
    display: none;
  }
</style>
</head>
<body>

<div class="phone">
  <div class="header">
    <span class="back">‹</span>
    <img class="avatar" id="headerAvatar" src="" alt="">
    <div class="info">
      <div class="name">Містер Х</div>
      <div class="status" id="statusLine">онлайн</div>
    </div>
    <div class="icons">⋮</div>
  </div>
  <div class="score-badge" id="scoreBadge" style="display:none;">✅ 0/3</div>
  <div class="messages" id="messages"></div>
  <button class="restart-fab" id="restartFab" title="Почати спочатку">↺</button>
  <div class="footer">
    <div class="input-fake">Повідомлення...</div>
    <div class="send">➤</div>
  </div>
</div>

// ---------- Rendering engine ----------
const messagesEl = document.getElementById('messages');
const scoreBadge = document.getElementById('scoreBadge');
const restartFab = document.getElementById('restartFab');
const statusLine = document.getElementById('statusLine');

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight + 200;
}

function typingDelay(text) {
  const len = (text || '').length;
  return Math.min(1400, Math.max(500, len * 18));
}

function showTyping() {
  const row = document.createElement('div');
  row.className = 'row in';
  row.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
  messagesEl.appendChild(row);
  scrollToBottom();
  return row;
}

function addSticker(name) {
  return new Promise(resolve => {
    const typingRow = showTyping();
    setTimeout(() => {
      typingRow.remove();
      const row = document.createElement('div');
      row.className = 'row in';
      const img = document.createElement('img');
      img.className = 'sticker-msg';
      img.src = STICKERS[name];
      row.appendChild(img);
      messagesEl.appendChild(row);
      scrollToBottom();
      resolve();
    }, 550);
  });
}

function addCharLine(text) {
  return new Promise(resolve => {
    const typingRow = showTyping();
    setTimeout(() => {
      typingRow.remove();
      const row = document.createElement('div');
      row.className = 'row in';
      row.innerHTML = `<div class="bubble in">${text}</div>`;
      messagesEl.appendChild(row);
      scrollToBottom();
      resolve();
    }, typingDelay(text));
  });
}

function addBotCard(bot) {
  return new Promise(resolve => {
    const typingRow = showTyping();
    setTimeout(() => {
      typingRow.remove();
      const row = document.createElement('div');
      row.className = 'row in';
      const titleHtml = bot.title ? `<div class="bot-title">${bot.title}</div>` : '';
      row.innerHTML = `<div class="bubble bot">${titleHtml}${bot.text.replace(/\n/g,'<br>')}</div>`;
      messagesEl.appendChild(row);
      scrollToBottom();
      resolve();
    }, typingDelay(bot.text) + 200);
  });
}

function addUserChoice(text) {
  const row = document.createElement('div');
  row.className = 'row out';
  row.innerHTML = `<div class="bubble out">${text}</div>`;
  messagesEl.appendChild(row);
  scrollToBottom();
}

function clearButtons() {
  const old = messagesEl.querySelector('.buttons-wrap');
  if (old) old.remove();
}

async function playSequence(seq) {
  for (const item of seq) {
    if (item.sticker) await addSticker(item.sticker);
    else if (item.char) {
      for (const line of item.char) await addCharLine(line);
    }
    else if (item.bot) await addBotCard(item.bot);
  }
}

function renderButtons(buttons) {
  const wrap = document.createElement('div');
  wrap.className = 'buttons-wrap';
  buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = b.label;
    btn.onclick = () => handleChoice(b);
    wrap.appendChild(btn);
  });
  messagesEl.appendChild(wrap);
  scrollToBottom();
}

async function handleChoice(b) {
  clearButtons();
  addUserChoice(b.label);
  if (typeof b.points === 'number') score += b.points;
  updateScoreBadge();
  scrollToBottom();

  if (b.action === 'restart') { restartAll(); return; }
  if (b.action === 'noop') { return; }

  await goToStep(b.next);
}

async function goToStep(id) {
  let step;
  if (id === 'menu') step = menuStep;
  else if (id === 'final') step = finalStep();
  else if (id === 'outro') step = outroStep;
  else if (id === 's2_final') step = s2FinalStep();
  else if (id === 's2_outro') step = s2OutroStep;
  else step = scenario[id];

  if (id === 'start' || id === 's2_start') {
    score = 0;
    updateScoreBadge();
    scoreBadge.style.display = 'none';
  }
  if (step.showScore || id === 'start' || id === 's2_start') { scoreBadge.style.display = 'block'; }
  await playSequence(step.sequence);
  if (step.buttons) renderButtons(step.buttons);
  if (id === 'outro' || id === 's2_outro') { restartFab.style.display = 'flex'; statusLine.textContent = 'був(-ла) щойно'; }
}

function updateScoreBadge() {
  scoreBadge.textContent = `✅ ${score}/3`;
}

function restartAll() {
  score = 0;
  updateScoreBadge();
  scoreBadge.style.display = 'none';
  restartFab.style.display = 'none';
  statusLine.textContent = 'онлайн';
  messagesEl.innerHTML = '';
  goToStep('menu');
}

restartFab.onclick = restartAll;
document.getElementById('headerAvatar').src = STICKERS.avatar;

// kick off
goToStep('menu');
</script>
